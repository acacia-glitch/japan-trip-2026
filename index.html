<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>媽咪與筑筑的東京旅遊小書</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fff0f5; color: #333; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h1 { color: #d87093; text-align: center; font-size: 24px; margin-bottom: 5px;}
    .subtitle { text-align: center; color: #a9a9a9; margin-bottom: 30px; font-size: 14px;}
    .day-block { border-left: 4px solid #ffb6c1; padding-left: 15px; margin-bottom: 30px; }
    .day-title { font-size: 18px; color: #333; margin-bottom: 15px; }
    .schedule p { margin: 10px 0; line-height: 1.5; }
    .time { font-weight: bold; color: #d87093; display: inline-block; width: 55px;}
    .note { font-size: 0.85em; color: #666; background: #fff8fa; padding: 4px 8px; border-radius: 5px; display: inline-block; margin-top: 4px;}
  </style>
</head>
<body>
  <div class="container">
    <h1>🌸 媽咪與筑筑的日本行 🌸</h1>
    <p class="subtitle">東京旅行日程與回憶紀錄</p>

    <div class="day-block">
      <div class="day-title"><strong>DAY 1 (4/6 Mon.) 抵達</strong></div>
      <div class="schedule">
        <p><span class="time">11:00</span> 到達 <a href="https://maps.google.com/?cid=1956240497297023895&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ" target="_blank" style="color: #d87093; text-decoration: underline; font-weight: bold;">桃園機場第一航廈</a><br><span class="note">💡 記得吃午餐！</span></p>
        <p><span class="time">14:25</span> 登機出境<br><span class="note">190 mins ✈️</span></p>
        <p><span class="time">18:35</span> 抵達 <a href="https://maps.google.com/?cid=14320255406666017353&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ" target="_blank" style="color: #d87093; text-decoration: underline; font-weight: bold;">成田國際機場第二航廈</a><br><span class="note">💡 兌換 Skyliner 車票、買點心墊肚子</span></p>
        <p><span class="time">21:30</span> 抵達京成上野站 (轉乘銀座線)<br>
        <a href="https://www.google.com/maps/dir/Narita+Airport+Terminal+2/Richmond+Hotel,+%EF%BC%92%E4%B8%81%E7%9B%AE-%EF%BC%97-10+%E6%B5%85%E8%8D%89,+%E5%8F%B0%E6%9D%B1%E5%8C%BA+%E6%9D%B1%E4%BA%AC%E9%83%BD,+Japan/data=!4m14!4m13!1m5!1m1!19sChIJOWLCT3bzImARSeoxn2vEu8Y!2m2!1d140.387543!2d35.773213!1m5!1m1!19sChIJW9L0p8aOGGARrFxZySniQBg!2m2!1d139.7943408!2d35.7143028!3e3" target="_blank" style="font-size: 0.85em; color: white; background: #d87093; padding: 6px 10px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 4px; box-shadow: 0 2px 4px rgba(216,112,147,0.3);">🗺️ 點我開啟：機場到飯店的轉乘導航</a></p>
        <p><span class="time">22:00</span> 抵達 <a href="https://maps.google.com/?cid=1747645324519365804&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ" target="_blank" style="color: #d87093; text-decoration: underline; font-weight: bold;">里士滿飯店 淺草店 🏨</a><br><span class="note">💡 放行李然後去覓食！</span></p>
      </div>
    </div>

    <div class="day-block">
      <div class="day-title"><strong>DAY 2 (4/7 Tue.) 新宿</strong></div>
      <div class="schedule">
        <p><span class="time">09:00</span> 出發前往 <a href="https://maps.google.com/?cid=12811393089244390490&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ" target="_blank" style="color: #d87093; text-decoration: underline; font-weight: bold;">上野恩賜公園 🌳</a></p>
        <p style="color: #999; font-size: 0.9em;">（後續行程建置中...）</p>
      </div>
    </div>
    
  </div>
</body>
</html>
